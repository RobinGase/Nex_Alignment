version: "1.1.3"

global_entrypoints:
  start_here: START_HERE.md
  core_index: core/README.md
  safety_index: safety/README.md
  runtime_index: runtime/README.md
  evaluation_index: evaluation/README.md
  playbooks_index: use_case_playbooks/README.md

required_validation_scripts:
  - tools/validate_use_case_profiles.ps1
  - tools/check_policy_runtime_parity.ps1
  - tools/run_enforcement_simulations.ps1

routes:
  - profile_id: website_frontend
    min_risk_class: 1
    autonomy_ceiling: A2
    docs:
      - core/README.md
      - runtime/use_case_profile_framework.md
      - safety/testing_and_verification.md
      - safety/runtime_behavioral_contracts.md
    output_reports:
      - audit_outputs/use_case_profile_validation_report.json
      - audit_outputs/policy_runtime_parity_report.json
      - audit_outputs/executable_simulation_results.json

  - profile_id: database_operations
    min_risk_class: 2
    autonomy_ceiling: A2
    docs:
      - core/README.md
      - core/configuration_and_risk_management.md
      - core/traceability_and_documentation.md
      - runtime/README.md
    output_reports:
      - audit_outputs/policy_runtime_parity_report.json

  - profile_id: payments_transfers
    min_risk_class: 3
    autonomy_ceiling: A2
    docs:
      - runtime/README.md
      - evaluation/economic_and_performance_risk_modeling.md
      - safety/risk_acceptance_and_residuals.md
